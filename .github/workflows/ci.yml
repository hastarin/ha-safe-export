name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[tools]" ruff pytest mypy

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Type check (non-blocking)
        run: mypy
        continue-on-error: true
